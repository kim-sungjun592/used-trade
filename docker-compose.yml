version: '3.8'

services:
  # 💻 프론트엔드 (리액트) 서비스
  frontend:
    build:
      context: ./frontend  # 👈 [수정 완료] 이제 도커가 frontend 폴더 안을 찾아봅니다!
      dockerfile: ../Dockerfile # 최상위에 있는 Dockerfile을 바라봅니다.
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app    # 👈 [수정 완료] 내 컴퓨터의 frontend 폴더와 동기화합니다.
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # 파일 변경 실시간 감지용
    depends_on:
      - backend

  # 🚀 백엔드 (Node.js API 서버) 서비스
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000" # 다시 깔끔하게 5000:5000으로 연동해 둡니다.
    volumes:
      - ./backend:/app
      - /app/node_modules