version: '3.8'

services:
  # 💻 프론트엔드 (리액트) 서비스
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # 파일 변경 실시간 감지용
    depends_on:
      - backend

  # 🚀 백엔드 (Node.js API 서버) 서비스 추가!
  # 🚀 백엔드 서비스 구역 수정
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000" # 💡 왼쪽(내 컴퓨터 포트)을 5001로 바꿉니다! (컨테이너 안의 5000번과 연결)
    volumes:
      - ./backend:/app
      - /app/node_modules